<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Document</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body{
    background:#f5f5f5;
}
.top-bar{
    background:#0d6efd;
}
.top-bar a{
    color:rgb(236, 236, 236);
    text-decoration:none;
    margin-right:20px;
    font-size:15px;
}
.header{
    background:#0b4d84;
    padding:40px 0;
}

.navbar-nav{
    background-color: rgb(63, 63, 248);
}
.carousel img{
    height:450px;
    object-fit:cover;
}
.carousel img{
    width:100%;
    height:550px;
    object-fit:cover;
}

@media (max-width:768px){

.carousel img{
    height:220px;
}

.logo{
    font-size:30px;
}
.navbar-nav{
    background-color: #f5f5f5;
}

}
</style>

</head>
<body>

<!-- Top Menu -->
<div class="top-bar py-2">
<div class="container d-flex justify-content-between">

<div>
<a href="#">អំពីធនាគារអេបីអេ</a>
<a href="#">ព័ត៌មាន</a>
<a href="#">ទំនាក់ទំនង</a>
<a href="#">ឪកាសការងារ</a>
<a href="#">ទីតាំង</a>
<a href="#">គណនា</a>
</div>

<div>
<i class="fab fa-facebook text-white me-3"></i>
<i class="fab fa-linkedin text-white me-3"></i>
<i class="fab fa-youtube text-white"></i>
</div>

</div>
</div>

<!-- Header -->
<div class="container py-4">
    <div class="row align-items-center">

        <div class="col-lg-6 text-center text-lg-start mb-3 mb-lg-0">
            <img style="width: 75px;" class="rounded-circle" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7gKcg4bNhSoSYiCj8eNkxyihsXPc-9hrwogFjrogGlYQhH0bnFhy2yEwk&s=10" alt="">
            <span class="display-5 fw-bold text-primary me-3">
                ABA BANK
            </span>
        </div>

        <div class="mb-3 col-lg-6">
            <div class="input-group">
                <input class="form-control" placeholder="ស្វែងរកក្នុងវេបសាយទាំងមូល">
                <button class="btn btn-primary">
                    <i class="fa fa-search"></i>
                </button>
            </div>
        </div>

    </div>
</div>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm py-2">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand fw-bold text-primary" href="#">
            ABA BANK
        </a>

        <!-- Hamburger -->
        <button class="navbar-toggler ms-auto " type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="#">ទំព័រដើម</a></li>
                <li class="nav-item"><a class="nav-link" href="#">សេវាបុគ្គល</a></li>
                <li class="nav-item"><a class="nav-link" href="#">សេវាអាជីវកម្ម</a></li>
                <li class="nav-item"><a class="nav-link" href="#">ធនាគារឌីជីថល</a></li>
                <li class="nav-item"><a class="nav-link" href="#">ជំនួយ</a></li>
                <li class="nav-item"><a class="nav-link" href="#">ព័ត៌មាន</a></li>
            </ul>

            <!-- Show only on desktop -->
            <div class="d-none d-lg-flex gap-2">
                <button class="btn btn-light">
                    <i class="fa-solid fa-lock"></i> Personal Banking
                </button>
                <button class="btn btn-light">
                    <i class="fa-solid fa-lock"></i> Business Banking
                </button>
            </div>

        </div>

    </div>
</nav>



<div id="slider" class="carousel slide" data-bs-ride="carousel">

<div class="carousel-inner">

<div class="carousel-item active">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTGywUOgO1srtm0Q-A0SJE2aJtM3tnYXQ0SP7qf4-qv8g&s=10" class="d-block w-100">
</div>

<div class="carousel-item">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSbafH7H75ApZ5utyp3RZ4hTJV3VGQcoWipfegNeTYgphMqzJBhx2teyeaT&s=10" class="d-block w-100">
</div>

</div>

<button class="carousel-control-prev" type="button" data-bs-target="#slider" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" type="button" data-bs-target="#slider" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
